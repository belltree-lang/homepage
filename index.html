<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>株式会社べるつりー コーポレートサイト</title>
    <meta name="description" content="株式会社べるつりー コーポレートサイト" />
    <meta name="robots" content="index,follow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="section hero fade-in" id="hero">
        <div class="container">
          <h1>運動から介護、終活まで。<br />地域で人生後半を支える総合サポート企業。</h1>
        </div>
      </section>

      <section class="section achievements fade-in" id="achievements">
        <div class="container">
          <h2>実績ブロック</h2>
          <ul id="achievement-list" class="achievement-list" aria-label="実績ブロック"></ul>
        </div>
      </section>

      <section class="section support-model fade-in" id="support-model">
        <div class="container">
          <h2>人生の変化に寄り添う支援モデル</h2>
          <p>私たちは、人生の変化に合わせて支え続けます。</p>
        </div>
      </section>

      <section class="section representative fade-in" id="representative-message">
        <div class="container">
          <h2>代表メッセージ</h2>
          <div class="message-frame" aria-hidden="true"></div>
        </div>
      </section>

      <section class="section business fade-in" id="business">
        <div class="container">
          <h2>事業一覧（4事業同列）</h2>
          <div id="business-grid" class="business-grid" aria-label="事業一覧"></div>
        </div>
      </section>

      <section class="section partners fade-in" id="partners">
        <div class="container">
          <h2>連携・パートナー</h2>
          <div class="partner-icons" aria-label="連携・パートナー">
            <div class="line-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="presentation"><circle cx="24" cy="24" r="18" /><path d="M16 24h16M24 16v16" /></svg>
            </div>
            <div class="line-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="presentation"><rect x="12" y="12" width="24" height="24" rx="6" /><path d="M16 24h16" /></svg>
            </div>
            <div class="line-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="presentation"><path d="M24 8 40 18v12L24 40 8 30V18z" /><path d="M24 8v32" /></svg>
            </div>
          </div>
        </div>
      </section>

      <section class="section history fade-in" id="history">
        <div class="container">
          <h2>沿革</h2>
          <ul id="history-list" class="history-list" aria-label="沿革"></ul>
        </div>
      </section>
    </main>

    <footer class="footer-contact">
      <a href="tel:0000000000">電話</a>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
