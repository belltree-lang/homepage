name: FTP Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Execute Cleanup
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;

          echo 'Listing current files before cleanup:'
          cls -l

          echo 'Removing WordPress PHP files'
          rm -f index.php
          rm -f xmlrpc.php
          rm -f readme.html
          rm -f license.txt
          rm -f wp-config.php
          rm -f wp-login.php
          rm -f wp-settings.php
          rm -f wp-cron.php
          rm -f wp-load.php

          echo 'Removing WordPress directories'
          rm -r wp-admin/
          rm -r wp-includes/

          echo 'Keeping wp-content for safety'

          echo 'Disabling WordPress rewrite rules'
          mv .htaccess .htaccess.backup

          echo 'Remaining files after cleanup:'
          cls -l
          "
