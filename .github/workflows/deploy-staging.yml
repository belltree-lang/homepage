name: Deploy to Staging (/test/)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  staging-deploy:
    name: 🚀 Deploy to /test/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: test/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            governance/**
            tasks/**
            reports/**
            docs/**
            *.md
            lolipop_staging/**
