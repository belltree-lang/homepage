<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>送信を受け付けました｜株式会社べるつりー</title>
<meta name="robots" content="noindex" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column;
    background-color: #FAF4EA;
    background-image:
      radial-gradient(circle at 12% 12%, rgba(255,232,212,0.55) 0%, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,232,217,0.40) 0%, transparent 40%);
  }
  a { text-decoration: none; }
  .t-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .t-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 24px; }
  .t-logo { display: flex; align-items: center; gap: 10px; color: var(--bt-primary); font-family: var(--bt-font-serif); font-weight: 700; font-size: 19px; }
  .t-logo img { width: 36px; height: 36px; }
  .t-logo small { font-size: 11px; font-weight: 500; color: var(--bt-ink-3); margin-left: 2px; }
  .t-cta { background: var(--bt-accent); color: #fff; padding: 9px 18px; border-radius: var(--bt-r-pill); font-size: 13px; font-weight: 600; white-space: nowrap; }
  .t-cta:hover { opacity: .92; }
  @media (max-width: 480px) { .t-header { padding: 12px 16px; } .t-logo { font-size: 16px; } }
  .card {
    max-width: 560px; width: 100%; text-align: center;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 24px; box-shadow: 0 24px 60px rgba(80,55,30,0.12);
    padding: 52px 40px;
  }
  .mark { width: 64px; height: 64px; margin: 0 auto 24px; }
  .card h1 { font-family: var(--bt-font-serif); font-weight: 600; font-size: 26px; color: var(--bt-primary); margin: 0 0 16px; }
  .card p { font-size: 15px; color: var(--bt-ink-2); line-height: 2; margin: 0 0 12px; }
  .card .tel { font-family: var(--bt-font-serif); font-weight: 700; font-size: 22px; color: var(--bt-primary); margin: 18px 0 6px; display: inline-block; }
  .card .hours { font-size: 13px; color: var(--bt-ink-3); margin: 0 0 28px; }
  .home {
    display: inline-flex; align-items: center; justify-content: center;
    height: 48px; padding: 0 30px; border-radius: var(--bt-r-pill);
    border: 1.5px solid var(--bt-primary); color: var(--bt-primary);
    font-weight: 600; font-size: 14px;
  }
  .home:hover { background: var(--bt-primary); color: #fff; }
</style>
</head>
<body>
  <header class="t-header">
    <a class="t-logo" href="../../index.html"><img src="../../assets/belltree-mark.svg" alt="" />BellTree <small>べるつりー</small></a>
    <a class="t-cta" href="../../contact/index.html">ご相談窓口</a>
  </header>
  <div class="t-main">
  <div class="card">
    <img class="mark" src="../../assets/belltree-mark.svg" alt="" />
    <h1>送信を受け付けました</h1>
    <p>お問い合わせありがとうございます。<br />内容を確認のうえ、通常2営業日以内に担当者からご連絡します。</p>
    <p>お急ぎの方は、お電話でも承ります。</p>
    <a class="tel" href="tel:0426822839">042-682-2839</a>
    <p class="hours">平日 9:00〜18:00（日祝休）</p>
    <a class="home" href="../../index.html">トップページへ戻る</a>
  </div>
  </div>
</body>
</html>
