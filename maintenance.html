<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BellTree - リニューアル準備中</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .maintenance-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: var(--space-xl) var(--container-padding);
        background-color: var(--color-background-soft);
      }
      .maintenance-card {
        background: var(--color-surface);
        padding: var(--space-2xl) var(--space-xl);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        max-width: var(--container-narrow);
        width: 100%;
        text-align: center;
        border-top: 5px solid var(--color-accent);
      }
      .maintenance-logo {
        margin-bottom: var(--space-xl);
      }
      .maintenance-headline {
        margin-bottom: var(--space-lg);
        color: var(--color-primary);
        font-weight: var(--font-weight-bold);
      }
      .maintenance-body {
        color: var(--color-text-muted);
        line-height: var(--line-height-loose);
        margin-bottom: var(--space-2xl);
        white-space: pre-wrap;
      }
      .contact-info {
        background-color: var(--color-background-alt);
        padding: var(--space-lg);
        border-radius: var(--radius-md);
        display: inline-block;
        text-align: left;
        margin: 0 auto;
      }
      .contact-info p {
        margin-bottom: var(--space-xs);
        font-weight: var(--font-weight-medium);
      }
      .contact-info a {
        color: var(--color-accent);
        font-weight: var(--font-weight-bold);
      }
    </style>
  </head>
  <body>
    <main class="maintenance-container">
      <div class="maintenance-card">
        <div class="maintenance-logo">
          <a class="site-logo" href="../index.html">BellTree</a>
        </div>
        
        <h1 class="maintenance-headline">現在、ウェブサイトを<br>リニューアル準備中です。</h1>
        
        <p class="maintenance-body">より分かりやすく、地域の皆さまに
安心してご利用いただける情報提供を
行うためサイトを改修しております。

サービスのご相談・お問い合わせは
これまで通り受け付けております。

お急ぎの方は以下よりご連絡ください。</p>
        
        <div class="contact-info">
          <p>TEL：<a href="tel:042-682-2839">042-682-2839</a></p>
          <p>メール：<a href="mailto:belltree@belltree1102.com">belltree@belltree1102.com</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
